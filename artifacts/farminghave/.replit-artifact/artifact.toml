kind = "web"
previewPath = "/"
title = "FarmingHave"
version = "1.0.0"
id = "artifacts/farminghave"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18287

[services.development]
run = "pnpm --filter @workspace/farminghave run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farminghave", "run", "build" ]
publicDir = "artifacts/farminghave/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18287"
BASE_PATH = "/"
